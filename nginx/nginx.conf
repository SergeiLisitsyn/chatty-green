events {}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    upstream django {
        server web:8000;
    }

    server {
        listen 80;
        server_name chatty-green.com www.chatty-green.com;

        # Автоматический редирект с HTTP на HTTPS
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name chatty-green.com www.chatty-green.com;

        # 🔒 SSL-сертификаты (если используешь Let's Encrypt, пути будут такие)
        ssl_certificate     /etc/letsencrypt/live/chatty-green.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/chatty-green.com/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        # Безопасные заголовки
        add_header X-Content-Type-Options nosniff;
        add_header X-Frame-Options DENY;
        add_header X-XSS-Protection "1; mode=block";

        # Основной прокси на Django
        location / {
            proxy_pass         http://django;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_redirect     off;
        }

        # Запрещаем доступ к скрытым и внутренним файлам
        location ~ /\. {
            deny all;
        }
    }
}

