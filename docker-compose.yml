# docker-compose.yml

services:
  web:
    build: .
    container_name: web
    environment:
      - DJANGO_SETTINGS_MODULE=chatty.settings.prod
      - DOCKERIZED=1
    command: gunicorn Chatty_green.wsgi:application --bind 0.0.0.0:8000 --workers 3 --timeout 120
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./static:/app/static
      - ./staticfiles:/app/staticfiles
      - media_volume:/media


#  postojka:
