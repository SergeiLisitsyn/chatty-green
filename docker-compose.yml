#      - DB_HOST=host.docker.internal
#      - DB_PORT=5432
#    env_file:
#      - .env

  nginx:
    build:
      context: ./nginx      # берёт nginx/Dockerfile и nginx.conf
    container_name: nginx
    depends_on:
      - web
    volumes:
      - media_volume:/media
      - /etc/letsencrypt:/etc/letsencrypt:ro
    ports:
      - "80:80"
      - "443:443"

volumes:
  media_volume:

